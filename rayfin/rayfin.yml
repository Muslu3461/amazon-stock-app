id: amazon-stock-app
name: Amazon Stock Analytics
version: 1.0.0
services:
  auth:
    enabled: true
    fabric:
      enabled: true
    password:
      enabled: true
    allowedRedirectUris:
      - http://localhost:5174
      - https://tidal-creek-811db41606-westeurope.webapp.fabricapps.net
  data:
    enabled: false
  storage:
    enabled: false
  staticHosting:
    enabled: true
    root: .
    folder: dist
    buildCommand: npm run build
    indexDocument: index.html
  functions:
    enabled: false
